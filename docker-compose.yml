services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    shm_size: 2gb
    environment:
      POSTGRES_USER: halacha
      POSTGRES_PASSWORD: halacha
      POSTGRES_DB: halacha_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halacha -d halacha_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
